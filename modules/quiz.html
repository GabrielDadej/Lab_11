<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Kotlin</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color: #f2f2f2;
            padding: 40px;
        }

        .container{
            max-width: 800px;
            margin: auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
            color: #6A1B9A;
        }

        .question{
            margin-bottom: 30px;
        }

        .question h3{
            margin-bottom: 15px;
        }

        label{
            display: block;
            margin-bottom: 10px;
            padding: 10px;
            background-color: #f7f7f7;
            border-radius: 5px;
            cursor: pointer;
        }

        label:hover{
            background-color: #e9e9e9;
        }

        button{
            width: 100%;
            padding: 15px;
            background-color: #6A1B9A;
            color: white;
            border: none;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #4A148C;
        }

        #result{
            margin-top: 25px;
            font-size: 24px;
            text-align: center;
            font-weight: bold;
        }

    </style>
</head>
<body>
<script defer>
        if(!window.localStorage.getItem("punkty")) {
            window.localStorage.setItem("punkty", 0);
            console.log("Poprawnie stworzono zmienna w local storage.");
        }
    </script>
    <div class="container">

        <h1>Quiz Kotlin</h1>

        <form id="quizForm">

            <div class="question">
                <h3>1. Jak deklarujemy stałą w Kotlinie?</h3>

                <label>
                    <input type="radio" name="q1" value="a">
                    var
                </label>

                <label>
                    <input type="radio" name="q1" value="b">
                    val
                </label>

                <label>
                    <input type="radio" name="q1" value="c">
                    const
                </label>
            </div>

            <div class="question">
                <h3>2. Która funkcja wypisuje tekst w konsoli?</h3>

                <label>
                    <input type="radio" name="q2" value="a">
                    printText()
                </label>

                <label>
                    <input type="radio" name="q2" value="b">
                    console.log()
                </label>

                <label>
                    <input type="radio" name="q2" value="c">
                    println()
                </label>
            </div>

            <div class="question">
                <h3>3. Jaki typ danych przechowuje tekst?</h3>

                <label>
                    <input type="radio" name="q3" value="a">
                    String
                </label>

                <label>
                    <input type="radio" name="q3" value="b">
                    Int
                </label>

                <label>
                    <input type="radio" name="q3" value="c">
                    Boolean
                </label>
            </div>

            <div class="question">
                <h3>4. Jak wygląda funkcja główna programu?</h3>

                <label>
                    <input type="radio" name="q4" value="a">
                    start()
                </label>

                <label>
                    <input type="radio" name="q4" value="b">
                    main()
                </label>

                <label>
                    <input type="radio" name="q4" value="c">
                    run()
                </label>
            </div>

            <div class="question">
                <h3>5. Jakiego słowa używamy do tworzenia klasy?</h3>

                <label>
                    <input type="radio" name="q5" value="a">
                    object
                </label>

                <label>
                    <input type="radio" name="q5" value="b">
                    function
                </label>

                <label>
                    <input type="radio" name="q5" value="c">
                    class
                </label>
            </div>

            <button type="button" onclick="checkAnswers()">
                Sprawdź wynik
            </button>

        </form>

        <div id="result"></div>

    </div>

    <script>

        function checkAnswers(){

            let score = 0;

            const answers = {
                q1: "b",
                q2: "c",
                q3: "a",
                q4: "b",
                q5: "c"
            };

            const form = document.forms["quizForm"];

            for(let question in answers){

                if(form[question].value === answers[question]){
                    score++;
                }
            }

            document.getElementById("result").innerHTML =
                "Twój wynik: " + score + " / 5";

            
            window.localStorage.setItem("punkty", parseInt(window.localStorage.getItem("punkty")) + score);

        }

    </script>

</body>
</html>
